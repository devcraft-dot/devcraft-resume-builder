<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #f9fafb;
    }

    .header {
      background: #fff;
      padding: 12px 16px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .tab-row { display: flex; gap: 4px; }
    .tab-btn {
      padding: 5px 12px; font-size: 12px; font-weight: 500;
      border: 1px solid #d1d5db; border-radius: 6px;
      background: #fff; cursor: pointer; color: #374151;
    }
    .tab-btn:hover { background: #f3f4f6; }
    .tab-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }

    .panel { display: none; padding: 16px; }
    .panel.active { display: block; }

    /* ─── Control panel ─── */
    .controls { display: flex; gap: 6px; margin-bottom: 14px; }
    .controls button {
      flex: 1; padding: 9px 0; font-size: 13px; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer; transition: 0.15s;
    }
    .btn-start { background: #2563eb; color: #fff; }
    .btn-start:hover { background: #1d4ed8; }
    .btn-resume { background: #059669; color: #fff; }
    .btn-resume:hover { background: #047857; }
    .btn-pause { background: #f59e0b; color: #fff; }
    .btn-pause:hover { background: #d97706; }
    .btn-stop { background: #ef4444; color: #fff; }
    .btn-stop:hover { background: #dc2626; }
    .btn-reset { background: #6b7280; color: #fff; }
    .btn-reset:hover { background: #4b5563; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ─── Status ─── */
    .stats {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 12px; margin-bottom: 12px;
    }
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
      margin-bottom: 10px;
    }
    .stat-item { text-align: center; }
    .stat-num { font-size: 20px; font-weight: 700; color: #111827; }
    .stat-label { font-size: 10px; color: #6b7280; text-transform: uppercase; }
    .stat-num.green { color: #059669; }
    .stat-num.yellow { color: #d97706; }
    .stat-num.red { color: #ef4444; }

    .progress-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: #4b5563; margin-bottom: 6px;
    }
    .progress-row strong { color: #111827; }

    .status-msg {
      font-size: 12px; padding: 8px 10px; border-radius: 6px;
      background: #f3f4f6; color: #374151; word-break: break-word;
    }
    .status-msg.running { background: #dbeafe; color: #1e40af; }
    .status-msg.paused { background: #fef3c7; color: #92400e; }
    .status-msg.error { background: #fee2e2; color: #991b1b; }

    .skip-log-wrap {
      margin-top: 10px; font-size: 11px; color: #4b5563;
    }
    .skip-log-wrap summary {
      cursor: pointer; font-weight: 600; color: #374151; user-select: none;
    }
    .skip-log-wrap summary:hover { color: #111827; }
    pre#skip-log {
      margin-top: 6px; max-height: 160px; overflow: auto; white-space: pre-wrap;
      word-break: break-word; background: #fff; border: 1px solid #e5e7eb;
      padding: 8px; border-radius: 6px; font-size: 10px; line-height: 1.45;
      color: #374151;
    }

    /* ─── Profile selector ─── */
    .profile-select-row {
      display: flex; gap: 8px; align-items: center; margin-bottom: 14px;
    }
    .profile-select-row select {
      flex: 1; padding: 8px 10px; font-size: 13px;
      border: 1px solid #d1d5db; border-radius: 6px; background: #fff;
    }

    /* ─── Settings panel ─── */
    .profile-card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 12px; margin-bottom: 12px; position: relative;
    }
    .profile-card .card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .profile-card .card-title { font-weight: 600; font-size: 13px; }
    .profile-card .btn-delete {
      background: none; border: none; color: #9ca3af; cursor: pointer;
      font-size: 16px; padding: 2px 6px; border-radius: 4px;
    }
    .profile-card .btn-delete:hover { color: #ef4444; background: #fee2e2; }

    .field { margin-bottom: 10px; }
    .field label {
      display: block; font-size: 11px; font-weight: 600;
      color: #374151; margin-bottom: 3px;
    }
    .field input, .field select, .field textarea {
      width: 100%; padding: 7px 10px; font-size: 13px;
      border: 1px solid #d1d5db; border-radius: 6px; background: #fff;
      outline: none;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: #2563eb;
    }
    .field textarea {
      min-height: 120px; resize: vertical; font-family: inherit; line-height: 1.5;
    }
    .field .hint { font-size: 10px; color: #9ca3af; margin-top: 2px; }

    .btn-add-profile {
      width: 100%; padding: 9px; font-size: 13px; font-weight: 600;
      border: 2px dashed #d1d5db; border-radius: 8px; background: #fff;
      cursor: pointer; color: #6b7280; margin-bottom: 10px;
    }
    .btn-add-profile:hover { border-color: #2563eb; color: #2563eb; }

    .btn-save {
      width: 100%; padding: 10px; font-size: 13px; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer;
      background: #059669; color: #fff;
    }
    .btn-save:hover { background: #047857; }
    .save-status {
      text-align: center; font-size: 12px; color: #059669;
      margin-top: 6px; min-height: 16px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Indeed Automation</h1>
    <div class="tab-row">
      <button class="tab-btn active" data-tab="run">Run</button>
      <button class="tab-btn" data-tab="settings">Settings</button>
    </div>
  </div>

  <!-- ─── Run Panel ─── -->
  <div id="panel-run" class="panel active">
    <div class="profile-select-row">
      <label style="font-size:12px;font-weight:600;white-space:nowrap">Profile:</label>
      <select id="profile-picker"></select>
    </div>

    <div class="controls">
      <button id="btn-start" class="btn-start">Start</button>
      <button id="btn-resume" class="btn-resume" disabled>Resume</button>
      <button id="btn-pause" class="btn-pause" disabled>Pause</button>
      <button id="btn-stop" class="btn-stop" disabled>Stop</button>
    </div>

    <div class="stats">
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-num green" id="s-processed">0</div>
          <div class="stat-label">Generated</div>
        </div>
        <div class="stat-item">
          <div class="stat-num yellow" id="s-skipped">0</div>
          <div class="stat-label">Skipped</div>
        </div>
        <div class="stat-item">
          <div class="stat-num red" id="s-failed">0</div>
          <div class="stat-label">Failed</div>
        </div>
      </div>
      <div class="progress-row">
        Page <strong id="s-page">1</strong> &nbsp;·&nbsp;
        Job <strong id="s-job">0</strong> / <strong id="s-total">0</strong>
      </div>
      <div id="status-msg" class="status-msg">Ready — navigate to an Indeed search page</div>
      <details class="skip-log-wrap">
        <summary>Skip log (why jobs were skipped)</summary>
        <pre id="skip-log">No skips recorded yet.</pre>
      </details>
    </div>

    <div class="controls">
      <button id="btn-reset" class="btn-reset">Reset Progress</button>
    </div>
  </div>

  <!-- ─── Settings Panel ─── -->
  <div id="panel-settings" class="panel">
    <div id="profiles-container"></div>
    <button id="btn-add" class="btn-add-profile">+ Add Profile</button>
    <button id="btn-save" class="btn-save">Save All Settings</button>
    <div id="save-status" class="save-status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
